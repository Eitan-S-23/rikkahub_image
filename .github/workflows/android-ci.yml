name: Android CI Build

on:
  push:
    branches:
      - '**'

concurrency:
  group: android-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-sideload:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: web-ui/pnpm-lock.yaml

      - name: Install web-ui dependencies
        working-directory: web-ui
        run: pnpm install --frozen-lockfile

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Prepare CI build files
        env:
          SIDELOAD_KEYSTORE_BASE64: ${{ secrets.SIDELOAD_KEYSTORE_BASE64 }}
          SIDELOAD_KEYSTORE_PASSWORD: ${{ secrets.SIDELOAD_KEYSTORE_PASSWORD }}
          SIDELOAD_KEY_ALIAS: ${{ secrets.SIDELOAD_KEY_ALIAS }}
          SIDELOAD_KEY_PASSWORD: ${{ secrets.SIDELOAD_KEY_PASSWORD }}
        run: |
          cat > app/google-services.json <<'EOF'
          {
            "project_info": {
              "project_number": "0",
              "project_id": "rikkahub-ci",
              "storage_bucket": "rikkahub-ci.appspot.com"
            },
            "client": [
              {
                "client_info": {
                  "mobilesdk_app_id": "1:0:android:0000000000000000000000",
                  "android_client_info": {
                    "package_name": "me.rerere.rikkahub"
                  }
                },
                "oauth_client": [],
                "api_key": [
                  {
                    "current_key": "ci-placeholder"
                  }
                ],
                "services": {
                  "appinvite_service": {
                    "other_platform_oauth_client": []
                  }
                }
              },
              {
                "client_info": {
                  "mobilesdk_app_id": "1:0:android:0000000000000000000001",
                  "android_client_info": {
                    "package_name": "me.rerere.rikkahub.debug"
                  }
                },
                "oauth_client": [],
                "api_key": [
                  {
                    "current_key": "ci-placeholder"
                  }
                ],
                "services": {
                  "appinvite_service": {
                    "other_platform_oauth_client": []
                  }
                }
              }
            ],
            "configuration_version": "1"
          }
          EOF

          if [ -n "${SIDELOAD_KEYSTORE_BASE64:-}" ] || \
             [ -n "${SIDELOAD_KEYSTORE_PASSWORD:-}" ] || \
             [ -n "${SIDELOAD_KEY_ALIAS:-}" ] || \
             [ -n "${SIDELOAD_KEY_PASSWORD:-}" ]; then
            : "${SIDELOAD_KEYSTORE_BASE64:?Missing SIDELOAD_KEYSTORE_BASE64 GitHub secret}"
            : "${SIDELOAD_KEYSTORE_PASSWORD:?Missing SIDELOAD_KEYSTORE_PASSWORD GitHub secret}"
            : "${SIDELOAD_KEY_ALIAS:?Missing SIDELOAD_KEY_ALIAS GitHub secret}"
            : "${SIDELOAD_KEY_PASSWORD:?Missing SIDELOAD_KEY_PASSWORD GitHub secret}"

            printf '%s' "$SIDELOAD_KEYSTORE_BASE64" | base64 --decode > app/sideload.keystore
            {
              printf '%s\n' "sideloadStoreFile=sideload.keystore"
              printf '%s\n' "sideloadStorePassword=$SIDELOAD_KEYSTORE_PASSWORD"
              printf '%s\n' "sideloadKeyAlias=$SIDELOAD_KEY_ALIAS"
              printf '%s\n' "sideloadKeyPassword=$SIDELOAD_KEY_PASSWORD"
            } >> local.properties
          fi

      - name: Gradle Build
        run: |
          set -o pipefail
          chmod +x gradlew
          ./gradlew --no-daemon --console=plain assembleSideload 2>&1 | tee gradle-build.log

      - name: Summarize Gradle failure
        if: failure()
        run: |
          if [ -f gradle-build.log ]; then
            grep -n -E '(^e:| error: |Compilation error|FAILED|FAILURE:|Execution failed|Could not|Unresolved reference|Type mismatch)' gradle-build.log | head -n 200 > gradle-errors.log || true

            {
              echo "### Gradle build failed"
              echo
              if [ -s gradle-errors.log ]; then
                echo "#### Extracted errors"
                echo
                echo '```text'
                cat gradle-errors.log
                echo '```'
                echo
              fi
              echo "#### Log tail"
              echo
              echo '```text'
              tail -n 240 gradle-build.log
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"

            message="$(cat gradle-errors.log gradle-build.log | tail -n 80 | sed ':a;N;$!ba;s/%/%25/g;s/\r/%0D/g;s/\n/%0A/g')"
            echo "::error title=Gradle Build Failed::$message"
          fi

      - name: Upload sideload APKs
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: sideload-apks
          path: app/build/outputs/apk/sideload/*.apk

      - name: Publish latest sideload release
        if: success() && github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: main-latest
          RELEASE_NAME: Latest Main Sideload Build
        run: |
          set -euo pipefail

          git tag -f "$TAG_NAME" "$GITHUB_SHA"
          git push --force origin "refs/tags/$TAG_NAME"

          cat > release-notes.md <<EOF
          Automated sideload APK from the latest successful main branch build.

          Commit: ${GITHUB_SHA}
          Workflow run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}
          EOF

          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release edit "$TAG_NAME" --title "$RELEASE_NAME" --notes-file release-notes.md
          else
            gh release create "$TAG_NAME" --title "$RELEASE_NAME" --notes-file release-notes.md --target "$GITHUB_SHA"
          fi

          gh release view "$TAG_NAME" --json assets --jq '.assets[].name' |
            while IFS= read -r asset; do
              if [[ "$asset" == *.apk ]]; then
                gh release delete-asset "$TAG_NAME" "$asset" -y || true
              fi
            done

          gh release upload "$TAG_NAME" app/build/outputs/apk/sideload/*.apk --clobber
