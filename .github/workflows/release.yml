name: Release Build

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: web-ui/pnpm-lock.yaml

      - name: Install web-ui dependencies
        working-directory: web-ui
        run: pnpm install --frozen-lockfile

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Prepare CI google-services.json
        run: |
          cat > app/google-services.json <<'EOF'
          {
            "project_info": {
              "project_number": "0",
              "project_id": "rikkahub-ci",
              "storage_bucket": "rikkahub-ci.appspot.com"
            },
            "client": [
              {
                "client_info": {
                  "mobilesdk_app_id": "1:0:android:0000000000000000000000",
                  "android_client_info": {
                    "package_name": "me.rerere.rikkahub"
                  }
                },
                "oauth_client": [],
                "api_key": [
                  {
                    "current_key": "ci-placeholder"
                  }
                ],
                "services": {
                  "appinvite_service": {
                    "other_platform_oauth_client": []
                  }
                }
              },
              {
                "client_info": {
                  "mobilesdk_app_id": "1:0:android:0000000000000000000001",
                  "android_client_info": {
                    "package_name": "me.rerere.rikkahub.debug"
                  }
                },
                "oauth_client": [],
                "api_key": [
                  {
                    "current_key": "ci-placeholder"
                  }
                ],
                "services": {
                  "appinvite_service": {
                    "other_platform_oauth_client": []
                  }
                }
              }
            ],
            "configuration_version": "1"
          }
          EOF

      - name: Gradle Build
        run: |
          set -o pipefail
          chmod +x gradlew
          ./gradlew --no-daemon --console=plain assembleSideload 2>&1 | tee gradle-build.log

      - name: Summarize Gradle failure
        if: failure()
        run: |
          if [ -f gradle-build.log ]; then
            grep -n -E '(^e:| error: |Compilation error|FAILED|FAILURE:|Execution failed|Could not|Unresolved reference|Type mismatch)' gradle-build.log | head -n 200 > gradle-errors.log || true

            {
              echo "### Gradle build failed"
              echo
              if [ -s gradle-errors.log ]; then
                echo "#### Extracted errors"
                echo
                echo '```text'
                cat gradle-errors.log
                echo '```'
                echo
              fi
              echo "#### Log tail"
              echo
              echo '```text'
              tail -n 240 gradle-build.log
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"

            message="$(cat gradle-errors.log gradle-build.log | tail -n 80 | sed ':a;N;$!ba;s/%/%25/g;s/\r/%0D/g;s/\n/%0A/g')"
            echo "::error title=Gradle Build Failed::$message"
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: sideload-apks
          path: app/build/outputs/apk/sideload/*.apk

      - name: Publish GitHub release
        if: success()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" app/build/outputs/apk/sideload/*.apk --clobber
          else
            gh release create "$GITHUB_REF_NAME" app/build/outputs/apk/sideload/*.apk \
              --title "$GITHUB_REF_NAME" \
              --generate-notes
          fi
