name: Release Build

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: web-ui/pnpm-lock.yaml

      - name: Install web-ui dependencies
        working-directory: web-ui
        run: pnpm install --frozen-lockfile

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Prepare build files
        env:
          KEY_BASE64: ${{ secrets.KEY_BASE64 }}
          SIGNING_CONFIG: ${{ secrets.SIGNING_CONFIG }}
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          set -euo pipefail
          : "${KEY_BASE64:?Missing KEY_BASE64 GitHub secret}"
          : "${SIGNING_CONFIG:?Missing SIGNING_CONFIG GitHub secret}"
          : "${GOOGLE_SERVICES_JSON:?Missing GOOGLE_SERVICES_JSON GitHub secret}"

          printf '%s' "$KEY_BASE64" | base64 --decode > app/app.key
          printf '%s\n' "$SIGNING_CONFIG" > local.properties
          printf '%s\n' "$GOOGLE_SERVICES_JSON" > app/google-services.json

      - name: Gradle Build
        run: |
          chmod +x gradlew
          ./gradlew --no-daemon assembleRelease

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: release-apks
          path: app/build/outputs/apk/release/*.apk
